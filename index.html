<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Portal Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Welcome to Job Portal</h1>
      <p class="subtitle">Login with phone number to continue</p>

      <div class="role-selection">
        <button id="employerBtn" class="role-btn">Employer</button>
        <button id="jobseekerBtn" class="role-btn">Job Seeker</button>
      </div>

      <div class="input-group">
        <label for="phone">Phone Number</label>
        <input
          type="text"
          id="phone"
          placeholder="Enter Phone (+91XXXXXXXXXX)"
        />
        <small id="phoneError" class="error-text"></small>
      </div>

      <button id="sendOtpBtn" class="main-btn">Send OTP</button>
      <p id="otpStatus" class="success-text"></p>

      <div class="input-group">
        <label for="otp">OTP</label>
        <input
          type="text"
          id="otp"
          placeholder="Enter OTP"
        />
        <small id="otpError" class="error-text"></small>
      </div>

      <button id="verifyOtpBtn" class="main-btn">Verify & Continue</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
